<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Gemini Custom Interface - Pro</title>
  
  <!-- Fuentes -->
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  
  <!-- Highlight.js para colores de lenguajes de programación (Tema Oscuro) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  
  <!-- Marked.js para interpretar el Markdown correctamente -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- MathJax para Matemáticas (Fórmulas complejas) -->
  <script>
    window.MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
      svg: { fontCache: 'global' }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" id="MathJax-script" async></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #131314;
      --surface: #1e1f20;
      --surface2: #282a2c;
      --border: #333538;
      --border2: #444746;
      --text: #e3e3e3;
      --text-dim: #c4c7c5;
      --text-muted: #8e918f;
      --user-bubble: #282a2c;
      --ai-bubble: transparent;
      --accent: #a8c7fa;
      --danger: #f28b82;
      --gemini-gradient: linear-gradient(74deg, #4285f4 0, #9b72cb 9%, #d96570 20%, #d96570 24%, #9b72cb 35%, #4285f4 44%, #9b72cb 50%, #d96570 56%, #131314 75%, #131314 100%);
    }

    html { height: 100%; height: -webkit-fill-available; }
    body {
      height: 100vh; height: 100dvh;
      background: var(--bg); color: var(--text);
      font-family: 'Google Sans', -apple-system, sans-serif;
      overflow: hidden; display: flex; flex-direction: column;
    }

    /* ── MODAL DE ACCESO ──────────────────────────────────────── */
    #api-modal {
      position: fixed; inset: 0; z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      background: rgba(19, 19, 20, 0.9); backdrop-filter: blur(8px); padding: 20px;
    }
    .modal-box { width: 100%; max-width: 440px; background: var(--surface); border-radius: 24px; padding: 32px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
    .modal-logo { font-size: 24px; font-weight: 500; margin-bottom: 24px; background: var(--gemini-gradient); background-size: 400% 100%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .modal-label { font-size: 14px; font-weight: 500; margin-bottom: 12px; }
    .modal-input { width: 100%; background: var(--bg); border: 1px solid var(--border2); border-radius: 12px; color: var(--text); padding: 14px 16px; outline: none; margin-bottom: 8px; }
    .modal-input:focus { border-color: var(--accent); }
    .modal-error { font-size: 13px; color: var(--danger); margin-bottom: 12px; display: none; }
    .modal-hint { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
    .modal-hint a { color: var(--accent); text-decoration: none; }
    .btn-primary { width: 100%; background: var(--accent); color: #041e49; font-weight: 500; border: none; border-radius: 24px; padding: 12px; cursor: pointer; }
    .btn-primary:hover { opacity: 0.9; }

    /* ── DISEÑO GENERAL ────────────────────────────────────── */
    #app { display: none; flex-direction: column; height: 100vh; height: 100dvh; position: relative; }
    header { display: flex; align-items: center; justify-content: space-between; padding: 12px 24px; flex-shrink: 0; }
    .header-brand { font-size: 20px; font-weight: 500; color: var(--text-dim); }
    
    .model-selector select {
      appearance: none; background: var(--surface2); color: var(--text); border: none; padding: 8px 36px 8px 16px; font-family: inherit; font-size: 14px; font-weight: 500; border-radius: 8px; cursor: pointer; outline: none;
      background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2216%22%20height%3D%2216%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%23c4c7c5%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E'); background-repeat: no-repeat; background-position: right 12px center;
    }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .btn-icon { background: transparent; border: none; color: var(--text-dim); width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .btn-icon:hover { background: var(--surface2); }

    /* ── CHAT Y MENSAJES ───────────────────────────────────── */
    #messages-container { flex: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; scroll-behavior: smooth; }
    #messages { width: 100%; max-width: 800px; padding: 24px 20px 100px; display: flex; flex-direction: column; gap: 32px; }
    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    .welcome { padding: 40px 20px; animation: fadeIn .8s ease; max-width: 800px; width: 100%; margin: 10vh auto auto; }
    .welcome h2 { font-size: 40px; font-weight: 500; margin-bottom: 8px; background: var(--gemini-gradient); background-size: 300% 100%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: gradientShift 6s ease infinite; }
    .welcome p { font-size: 40px; font-weight: 500; color: #444746; margin-bottom: 40px; }

    .msg { display: flex; flex-direction: column; width: 100%; animation: msgIn .3s ease; }
    .msg-user { align-items: flex-end; }
    .msg-ai { align-items: flex-start; }
    .msg-header-ai { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
    .gemini-spark { width: 24px; height: 24px; background: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22%23a8c7fa%22%3E%3Cpath%20d%3D%22M12%2024C12%2017.3726%206.62742%2012%200%2012C6.62742%2012%2012%206.62742%2012%200C12%206.62742%2017.3726%2012%2024%2012C17.3726%2012%2012%2017.3726%2012%2024Z%22%2F%3E%3C%2Fsvg%3E') no-repeat center; background-size: contain; }

    .msg-bubble { font-size: 16px; line-height: 1.6; word-break: break-word; }
    .msg-user .msg-bubble { background: var(--user-bubble); padding: 12px 20px; border-radius: 24px 24px 4px 24px; max-width: 85%; }
    .msg-ai .msg-bubble { padding: 0 0 0 36px; width: 100%; }

    .stream-cursor { display: inline-block; width: 6px; height: 18px; background: var(--accent); border-radius: 3px; margin-left: 4px; vertical-align: middle; animation: blink 1s infinite; }
    .typing-skeleton { width: 100%; height: 20px; background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; margin-bottom: 8px; }
    .typing-skeleton.short { width: 60%; }

    /* ── CAJA DE TEXTO Y ARCHIVOS ─────────────────────────────────── */
    #input-wrapper { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, var(--bg) 60%, transparent); padding: 12px 20px 24px; display: flex; flex-direction: column; align-items: center; }
    .input-box { width: 100%; max-width: 800px; background: var(--surface); border-radius: 24px; display: flex; flex-direction: column; padding: 8px; }
    .input-box:focus-within { background: var(--surface2); }
    
    #image-preview-bar { display: none; gap: 12px; padding: 8px 12px; overflow-x: auto; }
    #image-preview-bar.has-images { display: flex; }
    .img-preview-item { position: relative; width: 60px; height: 60px; border-radius: 12px; overflow: hidden; background: var(--bg); flex-shrink: 0; }
    .img-preview-item img { width: 100%; height: 100%; object-fit: cover; }
    .doc-preview-badge { display: flex; align-items: center; justify-content: center; height: 100%; font-size: 11px; font-weight: bold; color: var(--text-dim); background: var(--surface2); text-transform: uppercase; }
    .img-remove-btn { position: absolute; top: 4px; right: 4px; width: 20px; height: 20px; border-radius: 50%; background: rgba(0,0,0,0.6); border: none; color: white; cursor: pointer; display: none; align-items: center; justify-content: center; }
    .img-preview-item:hover .img-remove-btn { display: flex; }

    .input-main-row { display: flex; align-items: flex-end; gap: 8px; padding: 4px; }
    #file-input { display: none; }
    #user-input { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-family: inherit; font-size: 16px; resize: none; max-height: 200px; padding: 12px 4px; margin-bottom: 2px; }
    .btn-circle { width: 40px; height: 40px; border-radius: 50%; border: none; background: transparent; color: var(--text-dim); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.2s; }
    .btn-circle:hover { background: var(--border); }
    #send-btn:not(:disabled) { color: var(--text); background: var(--surface2); }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .footer-disclaimer { font-size: 12px; color: var(--text-muted); text-align: center; margin-top: 12px; }

    /* ── ESTILOS MARKDOWN Y CÓDIGO (MARKED + HIGHLIGHT) ────────────────────────────── */
    .msg-bubble p { margin-bottom: 12px; }
    .msg-bubble ul, .msg-bubble ol { padding-left: 24px; margin-bottom: 12px; }
    .msg-bubble li { margin-bottom: 6px; }
    .msg-bubble h1, .msg-bubble h2, .msg-bubble h3 { margin: 24px 0 12px; font-weight: 500; }
    .msg-bubble a { color: var(--accent); }
    .msg-bubble table { width: 100%; border-collapse: collapse; margin: 16px 0; }
    .msg-bubble th, .msg-bubble td { padding: 10px; border: 1px solid var(--border2); text-align: left; }
    .msg-bubble th { background: var(--surface2); }
    
    /* Código inline */
    .msg-bubble code:not(.hljs) { font-family: 'Roboto Mono', monospace; background: var(--surface2); padding: 2px 6px; border-radius: 4px; font-size: 14px; }
    
    /* Bloques de código (Pre) */
    .msg-bubble pre { background: #0d0d0e; padding: 16px; border-radius: 12px; overflow-x: auto; margin: 16px 0; border: 1px solid var(--border); }
    .msg-bubble pre code { font-family: 'Roboto Mono', monospace; font-size: 14px; background: transparent; padding: 0; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes msgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
  </style>
</head>
<body>

<div id="api-modal">
  <div class="modal-box">
    <div class="modal-logo">Gemini Pro UI</div>
    <div class="modal-label">API Key</div>
    <input type="password" id="api-key-input" class="modal-input" placeholder="AIzaSy..." autocomplete="off"/>
    <div class="modal-error" id="api-error">API key inválida.</div>
    <div class="modal-hint">Obtén tu key en <a href="https://aistudio.google.com/app/apikey" target="_blank">Google AI Studio</a>.</div>
    <button class="btn-primary" id="save-key-btn" onclick="saveApiKey()">Acceder al Chat</button>
  </div>
</div>

<div id="app">
  <header>
    <div class="header-brand">Gemini</div>
    <div class="header-right">
      <div class="model-selector">
        <select id="gemini-model" onchange="changeModel()">
          <option value="gemini-1.5-flash">1.5 Flash (Rápido)</option>
          <option value="gemini-1.5-pro">1.5 Pro (Inteligente)</option>
          <option value="gemini-2.0-flash-exp">2.0 Flash Experimental</option>
        </select>
      </div>
      <button class="btn-icon" onclick="resetApiKey()" title="Cambiar API Key">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      </button>
    </div>
  </header>

  <div id="messages-container">
    <div id="messages">
      <div class="welcome">
        <h2>Hola, soy Gemini</h2>
        <p>¿En qué te puedo ayudar hoy?</p>
      </div>
    </div>
  </div>

  <div id="input-wrapper">
    <div class="input-box">
      <div id="image-preview-bar"></div>
      <div class="input-main-row">
        <!-- Input para múltiples archivos. Acepta imágenes, pdfs, texto, código, etc. -->
        <input type="file" id="file-input" accept="image/*,application/pdf,text/*,.py,.js,.lua,.html,.json" multiple/>
        <button class="btn-circle" onclick="triggerFileUpload()" title="Adjuntar archivo o imagen">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <textarea id="user-input" placeholder="Escribe tu consulta o pide que analice el archivo adjunto" rows="1"></textarea>
        <button id="send-btn" class="btn-circle" onclick="sendMessage()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
        </button>
        <button id="stop-btn" class="btn-circle" onclick="stopGeneration()" style="display:none; color: var(--danger);">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
        </button>
      </div>
    </div>
    <div class="footer-disclaimer">Gemini puede mostrar información imprecisa. Revisa las respuestas importantes.</div>
  </div>
</div>

<script>
  // Configuración de Marked.js con Highlight.js para dar color al código
  marked.setOptions({
    highlight: function(code, lang) {
      const language = hljs.getLanguage(lang) ? lang : 'plaintext';
      return hljs.highlight(code, { language }).value;
    },
    langPrefix: 'hljs language-'
  });

  let apiKey = localStorage.getItem('gemini_custom_key') || '';
  let messages = [];
  let abortController = null;
  let isGenerating = false;
  let currentModel = 'gemini-1.5-flash';

  const SYSTEM_PROMPT = `Eres un experto asistente de IA (Google Gemini). Habla en español. 
Si el usuario te envía archivos o imágenes de código, analízalos meticulosamente. 
Siempre que devuelvas código, usa bloques de Markdown especificando el lenguaje (ejemplo: \`\`\`python).`;

  let pendingFiles = [];
  let filesLoadingCount = 0;

  window.onload = () => {
    if (apiKey) showApp();
    initTextarea();
    document.getElementById('file-input').addEventListener('change', handleFiles);
  };

  function changeModel() {
    currentModel = document.getElementById('gemini-model').value;
  }

  function showApp() {
    document.getElementById('api-modal').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    setTimeout(() => document.getElementById('user-input').focus(), 100);
  }

  function initTextarea() {
    const ta = document.getElementById('user-input');
    ta.addEventListener('input', () => {
      ta.style.height = 'auto';
      ta.style.height = Math.min(ta.scrollHeight, 200) + 'px';
    });
    ta.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!isGenerating) sendMessage(); }
    });
  }

  async function saveApiKey() {
    const input = document.getElementById('api-key-input');
    const key = input.value.trim();
    if (!key) return;
    document.getElementById('save-key-btn').textContent = 'Comprobando...';
    try {
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash?key=${key}`);
      if (res.ok) { apiKey = key; localStorage.setItem('gemini_custom_key', key); showApp(); } 
      else { document.getElementById('api-error').style.display = 'block'; }
    } catch { document.getElementById('api-error').style.display = 'block'; }
    document.getElementById('save-key-btn').textContent = 'Acceder al Chat';
  }

  function resetApiKey() {
    localStorage.removeItem('gemini_custom_key'); location.reload();
  }

  function triggerFileUpload() { document.getElementById('file-input').click(); }

  // Procesamiento de Archivos e Imágenes a Base64
  function handleFiles(e) {
    Array.from(e.target.files).forEach(file => {
      const isImage = file.type.startsWith('image/');
      let ext = file.name.split('.').pop().toUpperCase();
      const entry = { file, base64: null, mimeType: file.type || 'text/plain', name: file.name, isImage, ext, ready: false };
      
      if (isImage) entry.previewUrl = URL.createObjectURL(file);
      pendingFiles.push(entry);
      filesLoadingCount++;
      updateSendState();
      
      const reader = new FileReader();
      reader.onload = ev => {
        entry.base64 = ev.target.result.split(',')[1];
        entry.ready = true;
        filesLoadingCount--;
        updateSendState();
        renderPreviews();
      };
      reader.readAsDataURL(file);
    });
    e.target.value = '';
    renderPreviews();
  }

  function renderPreviews() {
    const bar = document.getElementById('image-preview-bar');
    bar.innerHTML = '';
    bar.classList.toggle('has-images', pendingFiles.length > 0);
    pendingFiles.forEach((file, idx) => {
      const div = document.createElement('div');
      div.className = 'img-preview-item';
      if (file.isImage) {
        div.innerHTML = `<img src="${file.previewUrl}"><button class="img-remove-btn" onclick="removeFile(${idx})">✕</button>`;
      } else {
        div.innerHTML = `<div class="doc-preview-badge">${file.ext}</div><button class="img-remove-btn" onclick="removeFile(${idx})">✕</button>`;
      }
      bar.appendChild(div);
    });
  }

  function removeFile(idx) {
    if (pendingFiles[idx].previewUrl) URL.revokeObjectURL(pendingFiles[idx].previewUrl);
    pendingFiles.splice(idx, 1);
    renderPreviews();
  }

  function updateSendState() {
    document.getElementById('send-btn').disabled = (filesLoadingCount > 0 || isGenerating);
  }

  // Construye la estructura exacta que pide la API de Google
  function buildGeminiContents() {
    return messages.map(msg => {
      const role = msg.role === 'assistant' ? 'model' : 'user';
      let parts = [];
      if (Array.isArray(msg.content)) {
        msg.content.forEach(c => {
          if (c.type === 'file') {
            parts.push({ inlineData: { mimeType: c.mimeType, data: c.base64 } });
          } else {
            parts.push({ text: c.text });
          }
        });
      } else {
        parts.push({ text: msg.content });
      }
      return { role, parts };
    });
  }

  function scrollToBottom() {
    const container = document.getElementById('messages-container');
    container.scrollTop = container.scrollHeight;
  }

  async function sendMessage() {
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text && pendingFiles.length === 0) return;

    document.querySelector('.welcome')?.remove();

    let userPayload = text;
    if (pendingFiles.length > 0) {
      userPayload = pendingFiles.filter(f => f.ready).map(f => ({ type: 'file', mimeType: f.mimeType, base64: f.base64 }));
      userPayload.push({ type: 'text', text: text || 'Revisa este archivo.' });
    }

    messages.push({ role: 'user', content: userPayload });
    appendUserMsg(text, pendingFiles);
    
    input.value = '';
    input.style.height = 'auto';
    pendingFiles = [];
    renderPreviews();
    
    isGenerating = true; updateSendState();
    document.getElementById('send-btn').style.display = 'none';
    document.getElementById('stop-btn').style.display = 'flex';

    abortController = new AbortController();
    const typingUI = appendTypingMsg();

    try {
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${currentModel}:streamGenerateContent?alt=sse&key=${apiKey}`, {
        method: 'POST', signal: abortController.signal, headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: SYSTEM_PROMPT }] },
          contents: buildGeminiContents()
        })
      });

      typingUI.remove();
      if (!res.ok) throw new Error('API Error');

      const { contentEl, cursor } = appendStreamingMsg();
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let fullText = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value, { stream: true });
        chunk.split('\n').forEach(line => {
          if (line.startsWith('data: ')) {
            try {
              const textPart = JSON.parse(line.slice(6)).candidates?.[0]?.content?.parts?.[0]?.text;
              if (textPart) { 
                fullText += textPart; 
                // Renderizado en vivo con Marked
                contentEl.innerHTML = marked.parse(fullText) + '<span class="stream-cursor"></span>';
                scrollToBottom(); 
              }
            } catch {}
          }
        });
      }
      // Renderizado final sin cursor
      contentEl.innerHTML = marked.parse(fullText);
      messages.push({ role: 'assistant', content: fullText });
      
      // Aplicar LaTeX si hay matemáticas
      if (window.MathJax) window.MathJax.typesetPromise([contentEl]);

    } catch (err) {
      if(typingUI) typingUI.remove();
      if (err.name !== 'AbortError') appendAIMsg('Ha ocurrido un error. Asegúrate de que el modelo soporte los archivos enviados.');
    }

    isGenerating = false; updateSendState();
    document.getElementById('send-btn').style.display = 'flex';
    document.getElementById('stop-btn').style.display = 'none';
    scrollToBottom();
  }

  function stopGeneration() {
    if (abortController) abortController.abort();
    isGenerating = false;
  }

  function appendUserMsg(text, files) {
    const div = document.createElement('div'); div.className = 'msg msg-user';
    let content = '';
    if (files.length) content += `<div style="display:flex;gap:8px;margin-bottom:8px">` + files.map(f => f.isImage ? `<img src="${f.previewUrl}" style="height:60px;border-radius:8px">` : `<div style="background:var(--surface2);padding:8px 12px;border-radius:8px;font-size:12px;font-weight:bold;color:var(--text-dim)">📄 Archivo ${f.ext}</div>`).join('') + `</div>`;
    if (text) content += `<div>${text.replace(/\n/g, '<br>')}</div>`;
    div.innerHTML = `<div class="msg-bubble">${content}</div>`;
    document.getElementById('messages').appendChild(div);
    scrollToBottom();
  }

  function appendTypingMsg() {
    const div = document.createElement('div'); div.className = 'msg msg-ai';
    div.innerHTML = `<div class="msg-header-ai"><div class="gemini-spark"></div></div><div class="msg-bubble"><div class="typing-skeleton"></div><div class="typing-skeleton short"></div></div>`;
    document.getElementById('messages').appendChild(div); scrollToBottom(); return div;
  }

  function appendStreamingMsg() {
    const div = document.createElement('div'); div.className = 'msg msg-ai';
    const bubble = document.createElement('div'); bubble.className = 'msg-bubble';
    const content = document.createElement('div');
    div.innerHTML = `<div class="msg-header-ai"><div class="gemini-spark"></div></div>`;
    bubble.appendChild(content); div.appendChild(bubble); document.getElementById('messages').appendChild(div);
    scrollToBottom(); return { contentEl: content };
  }

  function appendAIMsg(text) {
    const div = document.createElement('div'); div.className = 'msg msg-ai';
    div.innerHTML = `<div class="msg-header-ai"><div class="gemini-spark"></div></div><div class="msg-bubble">${marked.parse(text)}</div>`;
    document.getElementById('messages').appendChild(div); scrollToBottom();
  }
</script>
</body>
</html>
